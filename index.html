<title>Family Transition Planning Guide</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:#f0ece4;color:#1a1e2a;overflow:hidden}

/* ── LAYOUT ── */
#shell{display:flex;flex-direction:column;height:100vh}
#header{background:#1b2333;padding:0 22px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.05)}
#header-left{display:flex;align-items:center;gap:14px;padding:11px 0}
#logo{width:34px;height:34px;border-radius:4px;background:#c4501e;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'IBM Plex Serif',serif;font-weight:600;font-size:12.5px;color:#fff;letter-spacing:-.3px}
#app-title{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:16px;color:#fff;letter-spacing:-.2px;line-height:1.2}
#app-sub{font-size:10.5px;color:rgba(255,255,255,.38);margin-top:2px}
#lang-btn{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:none;padding:7px 16px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;border-radius:4px}
#body{display:flex;flex:1;overflow:hidden}
#sidebar{width:198px;background:#1b2333;padding:14px 0;flex-shrink:0;overflow-y:auto;border-right:1px solid rgba(255,255,255,.03)}
.nav-divider{height:1px;background:rgba(255,255,255,.06);margin:7px 16px}
.nav-btn{display:block;width:100%;text-align:left;padding:7px 16px;background:transparent;color:rgba(255,255,255,.6);border:none;border-left:2px solid transparent;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:12.5px;font-weight:400;line-height:1.4;transition:all .1s}
.nav-btn.active{background:rgba(255,255,255,.06);color:#f0c185;border-left-color:#c4501e;font-weight:600}
#main{flex:1;overflow-y:auto;padding:22px 28px;background:#f0ece4}
#footer{background:#1b2333;color:rgba(255,255,255,.25);padding:6px 22px;font-size:10.5px;text-align:center;flex-shrink:0;border-top:1px solid rgba(255,255,255,.04)}

/* ── UDL TOOLBAR ── */
#udl-bar{display:flex;align-items:center;gap:6px;padding:7px 0 10px;border-bottom:1px solid #dbd5c8;margin-bottom:22px;flex-wrap:wrap}
.udl-label{font-size:10.5px;font-weight:600;color:#6a6f80;text-transform:uppercase;letter-spacing:.07em;margin-right:4px}
.udl-sep{width:1px;height:16px;background:#dbd5c8}
.udl-txt{font-size:11px;color:#6a6f80;margin-right:2px}
.udl-btn{font-family:'IBM Plex Sans',sans-serif;border:1px solid #dbd5c8;border-radius:4px;cursor:pointer;padding:3px 11px;font-size:11.5px;font-weight:500;line-height:1.4;background:transparent;color:#6a6f80;transition:all .1s;display:inline-flex;align-items:center;gap:5px}
.udl-btn.active{background:rgba(196,80,30,.08);color:#c4501e;border-color:rgba(196,80,30,.4)}
.udl-btn-sz{font-family:'IBM Plex Serif',serif;font-weight:600;padding:2px 8px}
#sz-1{font-size:13px}.udl-btn-sz#sz-2{font-size:15.5px}.udl-btn-sz#sz-3{font-size:18px}

/* ── CONTENT AREA ── */
#content{transition:zoom .1s}
.zoom-lg{zoom:1.15}
.zoom-xl{zoom:1.32}

/* ── SECTION HEADER ── */
.sec-h1{font-family:'IBM Plex Serif',serif;font-size:25px;font-weight:600;color:#1a1e2a;line-height:1.2;margin:0 0 6px}
.sec-sub{font-size:13px;color:#6a6f80;line-height:1.6;margin:0}
.sec-rule{margin-top:14px;height:2px;margin-bottom:28px}

/* ── CARDS ── */
.card{background:#fff;border-radius:7px;padding:17px 20px;margin-bottom:12px;border:1px solid #dbd5c8}
.card-top{border-top:3px solid #c4501e}
.card-left{border-left:3px solid #c4501e}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

/* ── ALERTS ── */
.alert{border-left:3px solid #c4501e;padding:11px 15px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;background:#fdf1ec}
.alert.info{border-left-color:#2a6e8a;background:#eaf4f8}
.alert-dot{width:15px;height:15px;border-radius:50%;background:#c4501e;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.alert.info .alert-dot{background:#2a6e8a}
.alert-body{font-size:13px;color:#1a1e2a;line-height:1.7}

/* ── STEPS ── */
.step{display:flex;gap:14px;margin-bottom:10px;background:#fff;border-radius:7px;padding:14px 16px;border:1px solid #dbd5c8}
.step-num{width:30px;height:30px;border-radius:50%;background:#1b2333;color:#f0c185;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Serif',serif;font-weight:600;font-size:13px;flex-shrink:0}
.step-title{font-weight:600;font-size:13.5px;color:#1a1e2a;margin-bottom:3px}
.step-body{font-size:13px;color:#6a6f80;line-height:1.7}

/* ── CONTACTS ── */
.contact-card{background:#faf8f4;border-radius:6px;padding:11px 14px;border:1px solid #dbd5c8;margin-bottom:7px}
.contact-name{font-weight:600;font-size:13px;color:#1a1e2a;margin-bottom:5px}
.contact-details{font-size:12px;color:#6a6f80;display:flex;flex-wrap:wrap;gap:4px 13px}

/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:8px 11px;text-align:left;font-weight:600;color:#6a6f80;border-bottom:1px solid #dbd5c8;font-size:11px;text-transform:uppercase;letter-spacing:.05em;background:#faf8f4}
.tbl td{padding:10px 11px;border-bottom:1px solid #dbd5c8;vertical-align:top;line-height:1.65;color:#6a6f80}
.tbl td:first-child{font-weight:600;color:#1a1e2a}
.tbl tr:nth-child(even) td{background:#faf8f4}

/* ── PILLS & LABELS ── */
.pill{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:3px;letter-spacing:.04em}
.sub-lbl{font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}

/* ── HEADING ── */
.h3{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:15px;color:#1a1e2a;margin:20px 0 10px}

/* ── OVERVIEW CARDS ── */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ov-card{text-align:left;background:#fff;border:1px solid #dbd5c8;border-radius:7px;padding:15px 17px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;width:100%}
.ov-card:hover{border-color:#bfb8aa}
.ov-card-title{font-weight:600;font-size:13.5px;margin-bottom:5px}
.ov-card-desc{font-size:12px;color:#6a6f80;line-height:1.6;margin:0}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.stat-box{background:#eaf4f8;border-radius:5px;padding:10px;text-align:center}
.stat-val{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:16px;color:#2a6e8a}
.stat-lbl{font-size:10.5px;color:#2a6e8a;margin-top:2px;opacity:.8}

/* ── CHECKLIST ── */
.progress-bar-wrap{background:#dbd5c8;border-radius:100px;height:5px;overflow:hidden;margin-top:5px}
.progress-bar-fill{height:100%;border-radius:100px;transition:width .3s;background:#c4501e}
.cl-group-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid}
.cl-group-age{font-family:'IBM Plex Serif',serif;font-weight:600;font-size:15px}
.cl-group-sub{font-size:11.5px;color:#6a6f80;font-style:italic}
.cl-item{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;margin-bottom:5px;cursor:pointer;background:#fff;border:1px solid #dbd5c8;border-radius:0 6px 6px 0;transition:all .12s}
.cl-item.urgent{border-color:#e8b49e}
.cl-item.done{background:#f5f3ef}
.cl-item.done .cl-text{text-decoration:line-through;color:#6a6f80}
.cl-check{width:15px;height:15px;border-radius:3px;border:2px solid #c0bdb0;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:9px;font-weight:700;color:#fff;transition:all .12s}
.cl-check.checked{background:currentColor;border-color:currentColor}
.cl-text{font-size:13px;color:#1a1e2a;line-height:1.6;flex:1}
.cl-urgent-badge{font-size:10px;font-weight:600;background:#fdf1ec;color:#c4501e;padding:1px 7px;border-radius:3px;letter-spacing:.04em;flex-shrink:0;align-self:center}

/* ── CONTACTS SEARCH ── */
#contacts-search,#contacts-filter{padding:8px 12px;border:1px solid #dbd5c8;border-radius:5px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;background:#fff;color:#1a1e2a;outline:none}
#contacts-search{flex:1 1 180px}

/* ── HIGH CONTRAST ── */
body.hc{background:#111;color:#f0ede6}
body.hc #header,body.hc #sidebar,body.hc #footer{background:#000}
body.hc #main,body.hc #content{background:#111}
body.hc .card,body.hc .step,body.hc .contact-card,body.hc .ov-card,.hc .cl-item{background:#1d1d1d;border-color:#3c3c38;color:#f0ede6}
body.hc .sec-h1,body.hc .h3,body.hc .step-title,.hc .cl-text,.hc .contact-name,.hc .tbl td:first-child{color:#f0ede6}
body.hc .sec-sub,body.hc .step-body,body.hc .alert-body,body.hc .contact-details,body.hc .tbl td{color:#b0aaa0}
body.hc .alert{background:#2a1005;border-left-color:#ff6b35}
body.hc .alert.info{background:#051822;border-left-color:#5acbf5}
body.hc .alert-dot{background:#ff6b35}
body.hc .alert.info .alert-dot{background:#5acbf5}
body.hc .tbl th,body.hc .tbl tr:nth-child(even) td{background:#1a1a1a}
body.hc .tbl{color:#b0aaa0}
body.hc .tbl th{color:#b0aaa0}
body.hc .stat-box{background:#051822}
body.hc .stat-val,body.hc .stat-lbl{color:#5acbf5}
body.hc #contacts-search,body.hc #contacts-filter{background:#1d1d1d;border-color:#3c3c38;color:#f0ede6}
body.hc #udl-bar{border-color:#3c3c38}
body.hc .udl-sep{background:#3c3c38}
body.hc .udl-btn{border-color:#3c3c38;color:#b0aaa0}
body.hc .udl-txt,body.hc .udl-label{color:#b0aaa0}
body.hc .udl-btn.active{background:rgba(255,107,53,.12);color:#ff6b35;border-color:rgba(255,107,53,.4)}
body.hc .progress-bar-wrap{background:#3c3c38}
body.hc .cl-item{background:#1d1d1d;border-color:#3c3c38}
body.hc .cl-item.done{background:#111}
body.hc .cl-item.urgent{border-color:#7a3010}
body.hc .cl-check{border-color:#888}
body.hc .contact-card{background:#1a1a1a}

/* ── READ ALOUD HIGHLIGHT ── */
.card:hover,.step:hover,.alert:hover,.contact-card:hover{cursor:pointer;outline:2px solid rgba(196,80,30,.2);outline-offset:2px}
.cl-item:hover{outline:none}
.reading{outline:2px solid #c4501e !important;outline-offset:3px}
body.hc .reading{outline-color:#ff6b35 !important}

/* ── PRINT ── */
@media print{
  #header,#sidebar,#footer,#udl-bar{display:none!important}
  body{overflow:auto!important;background:#fff!important}
  #main{overflow:visible!important;height:auto!important;padding:20px!important;background:#fff!important}
  #content{zoom:1!important}
}
</style>
</head>

</div>

// ── HELPERS ───────────────────────────────────────────────────────────────────
function t(key){ return STR[S.lang][key] || ''; }
function e(str){ return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function secHeader(title, subtitle, accentColor){
  var grad = 'linear-gradient(to right,'+accentColor+','+accentColor+'30 70%,transparent)';
  return '<h1 class="sec-h1">'+e(title)+'</h1>'+(subtitle?'<p class="sec-sub">'+e(subtitle)+'</p>':'')+'<div class="sec-rule" style="background:'+grad+'"></div>';
}

function alert_(text, type){
  var cls = type==='info' ? 'alert info' : 'alert';
  return '<div class="'+cls+'"><div class="alert-dot">!</div><div class="alert-body">'+e(text)+'</div></div>';
}

function card(inner, extraClass, borderColor, side){
  var style = '';
  if(borderColor && side==='top') style = 'border-top:3px solid '+borderColor;
  if(borderColor && side==='left') style = 'border-left:3px solid '+borderColor;
  return '<div class="card'+(extraClass?' '+extraClass:'') +'" style="'+style+'">'+inner+'</div>';
}

function step(n, title, body){
  return '<div class="step"><div class="step-num">'+n+'</div><div><div class="step-title">'+e(title)+'</div><div class="step-body">'+e(body)+'</div></div></div>';
}

function pill(text, color){
  return '<span class="pill" style="background:'+color+'22;color:'+color+'">'+e(text)+'</span>';
}

function h3(text){ return '<div class="h3">'+e(text)+'</div>'; }

function contactCard(ct){
  var d = '';
  if(ct.phone)    d += '<span>📞 '+e(ct.phone)+'</span>';
  if(ct.tollFree) d += '<span>📞 TF: '+e(ct.tollFree)+'</span>';
  if(ct.tty)      d += '<span>TTY: '+e(ct.tty)+'</span>';
  if(ct.spanish)  d += '<span>🌎 Español: '+e(ct.spanish)+'</span>';
  if(ct.email)    d += '<span>✉️ '+e(ct.email)+'</span>';
  if(ct.web)      d += '<span>🌐 '+e(ct.web)+'</span>';
  if(ct.address)  d += '<span>📍 '+e(ct.address)+'</span>';
  if(ct.hours)    d += '<span>🕐 '+e(ct.hours)+'</span>';
  if(ct.note)     d += '<span style="font-style:italic">'+e(ct.note)+'</span>';
  return '<div class="contact-card"><div class="contact-name">'+e(ct.name)+'</div><div class="contact-details">'+d+'</div></div>';
}

function contactsGroup(cat){
  return CONTACTS.filter(function(c){ return c.cat===cat; }).map(contactCard).join('');
}

function renderChecklist(){
  var lg = S.lang;
  var data = CL[lg];
  var str = STR[lg];
  var total = data.reduce(function(s,g){ return s+g.items.length; },0);
  var done = Object.keys(S.checked).filter(function(k){ return S.checked[k]; }).length;
  var pct = total > 0 ? Math.round((done/total)*100) : 0;
  var title = lg==='en' ? 'Age-Based Action Checklist' : 'Lista de Acciones por Edad';
  var sub   = lg==='en' ? 'Use during family meetings to track transition milestones. Click any item to mark it complete.' : 'Use durante las reuniones familiares para seguir los hitos de transición. Haga clic en cualquier elemento para marcarlo como completado.';

  var html = secHeader(title,sub,'#c4501e');
  html += '<div class="card" style="display:flex;align-items:center;gap:16px;margin-bottom:22px">'
    +'<div style="flex:1"><div style="font-size:11.5px;color:#6a6f80;margin-bottom:5px">'+str.progress+': '+done+' / '+total+'</div>'
    +'<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div></div>'
    +'<button onclick="resetChecklist()" style="font-family:\'IBM Plex Sans\',sans-serif;font-size:11.5px;color:#c4501e;background:none;border:1px solid #e8b49e;border-radius:4px;padding:4px 11px;cursor:pointer">'+str.reset+'</button>'
    +'</div>';

  data.forEach(function(group, gi){
    html += '<div style="margin-bottom:22px">'
      +'<div class="cl-group-head" style="border-color:'+group.color+'">'
      +'<span class="cl-group-age" style="color:'+group.color+'">'+e(group.age)+'</span>'
      +'<span class="cl-group-sub">'+e(group.sub)+'</span></div>';
    group.items.forEach(function(item, ii){
      var key = gi+'-'+ii;
      var isDone = !!S.checked[key];
      var isUrgent = item.u;
      var borderLeftColor = isDone ? '#888' : (isUrgent ? '#c4501e' : group.color);
      var cls = 'cl-item'+(isDone?' done':'')+(isUrgent&&!isDone?' urgent':'');
      html += '<div class="'+cls+'" style="border-left:3px solid '+borderLeftColor+'" onclick="toggleCheck(\''+key+'\')">'
        +'<div class="cl-check'+(isDone?' checked':'')+'" style="color:'+group.color+'">'+(isDone?'✓':'')+'</div>'
        +'<span class="cl-text">'+e(item.t)+'</span>'
        +(isUrgent&&!isDone ? '<span class="cl-urgent-badge">'+str.urgentBadge+'</span>' : '')
        +'</div>';
    });
    html += '</div>';
  });
  return html;
}

  var lg = S.lang;
  var str = STR[lg];
  var title = lg==='en' ? 'Contacts Directory' : 'Directorio de Contactos';
  var sub   = lg==='en' ? 'All contacts from this guide — searchable and filterable by program area.' : 'Todos los contactos de esta guía — buscables y filtrables por área de programa.';
  var cats = Object.keys(CM[lg]);
  var opts = '<option value="">'+e(str.allCats)+'</option>'+cats.map(function(c){ return '<option value="'+c+'">'+e(CM[lg][c])+'</option>'; }).join('');
  var html = secHeader(title,sub,'#c4501e');
  html += '<div style="display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap">'
    +'<input id="contacts-search" type="text" placeholder="'+e(str.search)+'" oninput="filterContacts()" style="flex:1 1 180px">'
    +'<select id="contacts-filter" onchange="filterContacts()">'+opts+'</select></div>';
  html += '<div id="contacts-list">'+buildContactsList('','')+'</div>';
  return html;
}

function buildContactsList(q, cat){
  var lg = S.lang;
  var list = CONTACTS.filter(function(c){
    var ms = !q || c.name.toLowerCase().indexOf(q.toLowerCase())>=0 || (c.phone&&c.phone.indexOf(q)>=0) || (c.address&&c.address.toLowerCase().indexOf(q.toLowerCase())>=0);
    var mc = !cat || c.cat===cat;
    return ms && mc;
  });
  if(!list.length) return '<div style="text-align:center;padding:40px;color:#6a6f80;font-size:13.5px">'+e(STR[lg].noResults)+'</div>';
  return list.map(function(ct){
    var d = '';
    if(ct.phone)    d += '<span>📞 '+e(ct.phone)+'</span>';
    if(ct.tollFree) d += '<span>📞 TF: '+e(ct.tollFree)+'</span>';
    if(ct.tty)      d += '<span>TTY: '+e(ct.tty)+'</span>';
    if(ct.spanish)  d += '<span>🌎 Español: '+e(ct.spanish)+'</span>';
    if(ct.email)    d += '<span>✉️ '+e(ct.email)+'</span>';
    if(ct.web)      d += '<span>🌐 '+e(ct.web)+'</span>';
    if(ct.address)  d += '<span>📍 '+e(ct.address)+'</span>';
    if(ct.hours)    d += '<span>🕐 '+e(ct.hours)+'</span>';
    if(ct.note)     d += '<span style="font-style:italic">'+e(ct.note)+'</span>';
    return '<div style="background:#fff;border-radius:6px;padding:12px 15px;border:1px solid #dbd5c8;border-left:3px solid '+CC[ct.cat]+';margin-bottom:7px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'
      +'<div style="font-weight:600;font-size:13.5px;color:#1a1e2a">'+e(ct.name)+'</div>'
      +pill(CM[lg][ct.cat],CC[ct.cat])+'</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:4px 13px;font-size:12px;color:#6a6f80">'+d+'</div></div>';
  }).join('');
}

// ── RENDER ENGINE ─────────────────────────────────────────────────────────────
var RENDERERS = { overview:renderOverview, puns:renderPuns, legal:renderLegal, financial:renderFinancial, hsp:renderHsp, transport:renderTransport, recreation:renderRecreation, community:renderCommunity, checklist:renderChecklist, contacts:renderContacts };

function render(){
  var str = STR[S.lang];
  // Header
  document.getElementById('app-title').textContent = str.title;
  document.getElementById('lang-btn').textContent  = str.langBtn;
  document.getElementById('disclaimer').textContent = str.disclaimer;
  // UDL labels
  document.getElementById('udl-lbl').textContent   = str.udl.lbl;
  document.getElementById('udl-sz-lbl').textContent = str.udl.sz+':';
  document.getElementById('hc-lbl').textContent    = str.udl.hc;
  document.getElementById('ra-lbl').textContent    = S.speaking ? str.udl.stop : str.udl.ra;
  document.getElementById('print-lbl').textContent = str.udl.print;
  // Nav
  var navKeys = ['overview','puns','legal','financial','hsp','transport','recreation','community','checklist','contacts'];
  navKeys.forEach(function(key){
    var btn = document.querySelector('[data-key="'+key+'"]');
    if(btn){
      btn.textContent = str.nav[key];
      btn.className = 'nav-btn' + (S.section===key ? ' active' : '');
    }
  });
  // Content
  document.getElementById('content').innerHTML = RENDERERS[S.section]();
  // Scroll top
  document.getElementById('main').scrollTop = 0;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function nav(key){
  stopRA();
  S.section = key;
  render();
}

function toggleLang(){
  stopRA();
  S.lang = S.lang==='en' ? 'es' : 'en';
  document.documentElement.lang = S.lang;
  render();
}

var zoomClasses = ['','zoom-lg','zoom-xl'];
function setZoom(i){
  S.zoom = i;
  var c = document.getElementById('content');
  c.className = zoomClasses[i] || '';
  document.querySelectorAll('.udl-btn-sz').forEach(function(b,idx){ b.className = 'udl-btn udl-btn-sz'+(idx===i?' active':''); });
}

function toggleHC(){
  S.hc = !S.hc;
  document.body.classList.toggle('hc', S.hc);
  document.getElementById('hc-btn').classList.toggle('active', S.hc);
}

// Click-to-read: clicking any card, step, alert, or contact card reads just that element
var S_readEl = null;

function readElement(el){
  if(!window.speechSynthesis) return;
  stopRA();
  var text = (el.innerText||el.textContent||'').replace(/\n{3,}/g,'\n\n').trim();
  if(!text) return;
  S_readEl = el;
  el.classList.add('reading');
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang  = S.lang==='en' ? 'en-US' : 'es-MX';
  utt.rate  = 0.88;
  utt.onend = utt.onerror = function(){ clearReading(); };
  window.speechSynthesis.speak(utt);
  S.speaking = true;
  updateRABtn();
}

function clearReading(){
  if(S_readEl){ S_readEl.classList.remove('reading'); S_readEl = null; }
  S.speaking = false;
  updateRABtn();
}

function stopRA(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  clearReading();
}

function updateRABtn(){
  var str = STR[S.lang];
  var btn = document.getElementById('ra-btn');
  btn.classList.toggle('active', S.speaking);
  document.getElementById('ra-lbl').textContent = S.speaking ? str.udl.stop : str.udl.ra;
  btn.childNodes[0].textContent = S.speaking ? '⏹ ' : '⏹ ';
}

// Delegated click handler — readable elements: .card, .step, .alert, .contact-card
// Excludes .cl-item (checklist has its own toggle handler) and .ov-card (nav cards)
document.addEventListener('click', function(evt){
  if(!window.speechSynthesis) return;
  var READABLE = ['.card','.step','.alert','.contact-card'];
  var EXCLUDE  = ['.cl-item','.ov-card','button','input','select'];
  // Check if click is on an excluded element
  for(var i=0;i<EXCLUDE.length;i++){
    if(evt.target.closest(EXCLUDE[i])) return;
  }
  // Find closest readable ancestor
  for(var j=0;j<READABLE.length;j++){
    var el = evt.target.closest(READABLE[j]);
    if(el && document.getElementById('content').contains(el)){
      readElement(el);
      return;
    }
  }
});

function toggleCheck(key){
  S.checked[key] = !S.checked[key];
  render();
}

function resetChecklist(){
  S.checked = {};
  render();
}

function filterContacts(){
  var q   = document.getElementById('contacts-search').value;
  var cat = document.getElementById('contacts-filter').value;
  document.getElementById('contacts-list').innerHTML = buildContactsList(q, cat);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
